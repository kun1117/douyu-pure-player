<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>斗鱼纯净播放器</title>
    <script src="https://cdn.jsdelivr.net/npm/flv.js@latest"></script>
    <style>
        /* ============================
           主题变量（默认暗色 = 当前主题）
           ============================ */
        :root, #app { /* 暗色主题 */
            --bg-primary: #000;
            --bg-secondary: #0a0a0a;
            --bg-tertiary: #0f0f0f;
            --border-color: rgba(255,255,255,.06);
            --text-primary: #fff;
            --text-secondary: rgba(255,255,255,.7);
            --text-muted: rgba(255,255,255,.45);
            --text-placeholder: rgba(255,255,255,.3);
            --slider-bg: rgba(255,255,255,.2);
            --slider-thumb: #fff;
            --input-bg: rgba(255,255,255,.06);
            --input-border: rgba(255,255,255,.12);
            --avatar-border: rgba(255,255,255,.12);
            --overlay-bg: rgba(0,0,0,.6);
            --video-bg: #000;
            --accent: #FF4400;
            --accent-hover: #e63e00;
        }

        #app.light { /* 浅色主题 */
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --bg-tertiary: #ffffff;
            --border-color: rgba(0,0,0,.08);
            --text-primary: #1d1d1f;
            --text-secondary: rgba(0,0,0,.55);
            --text-muted: rgba(0,0,0,.4);
            --text-placeholder: rgba(0,0,0,.25);
            --slider-bg: rgba(0,0,0,.12);
            --slider-thumb: #888;
            --input-bg: rgba(0,0,0,.04);
            --input-border: rgba(0,0,0,.1);
            --avatar-border: rgba(0,0,0,.08);
            --overlay-bg: rgba(255,255,255,.7);
            --video-bg: #e8e8ea;
            --accent: #FF4400;
            --accent-hover: #e63e00;
        }

        /* ============================
           全局重置
           ============================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: var(--bg-primary);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ============================
           主播放器容器
           ============================ */
        #app {
            width: 100%; height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
        }

        #anchorBar {
            height: 90px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            padding: 0 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        #anchorBar .avatar {
            width: 64px; height: 64px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            border: 2px solid var(--avatar-border);
            margin-right: 16px;
        }
        #anchorBar .avatar img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }
        #anchorBar .info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #anchorBar .info .top-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #anchorBar .info .top-row .name {
            color: var(--text-primary);
            font-size: 24px;
            font-weight: 700;
            line-height: 1.2;
        }
        #anchorBar .info .top-row .live-badge {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        #anchorBar .info .top-row .live-badge .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #ff6b7b;
            animation: breath 1.5s infinite;
        }
        #anchorBar .info .top-row .live-badge .label {
            color: #ff4444;
            font-size: 16px;
            font-weight: 700;
        }
        #anchorBar .info .title {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 2px;
            line-height: 1.3;
        }
        @keyframes breath {
            0%,100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        #videoWrapper {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        video {
            width: 100%; height: 100%;
            object-fit: contain;
            display: block;
            background: var(--video-bg);
        }

        /* ============================
           初始界面
           ============================ */
        #launcher {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: var(--bg-primary);
            transition: opacity .5s ease;
        }
        #launcher.hidden {
            opacity: 0; pointer-events: none;
        }

        .launcher-logo {
            width: 80px; height: 80px; border-radius: 18px;
            background: linear-gradient(135deg, #FF4400, #ff7700);
            display: flex; align-items: center; justify-content: center;
            font-size: 44px; font-weight: 800; color: #fff;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(255,68,0,.3);
        }

        .launcher-title {
            font-size: 28px; font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
        }
        .launcher-sub {
            color: var(--text-muted); font-size: 15px;
            margin-bottom: 32px;
        }

        .launcher-form {
            display: flex; gap: 10px;
            width: 100%; max-width: 420px; padding: 0 20px;
        }
        .launcher-form input {
            flex: 1; padding: 12px 18px; border-radius: 8px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 16px; outline: none; transition: border .2s;
        }
        .launcher-form input:focus { border-color: var(--accent); }
        .launcher-form input::placeholder { color: var(--text-placeholder); }
        .launcher-form button {
            padding: 12px 28px; border-radius: 8px; border: none;
            background: var(--accent); color: #fff;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: background .2s, transform .15s;
            white-space: nowrap;
        }
        .launcher-form button:hover { background: var(--accent-hover); }
        .launcher-form button:active { transform: scale(.97); }

        .launcher-hint {
            margin-top: 16px; font-size: 13px;
            color: var(--text-placeholder);
        }
        .launcher-hint code {
            color: var(--text-muted);
            background: var(--input-bg);
            padding: 2px 8px; border-radius: 4px;
        }
        .launcher-error {
            margin-top: 12px; color: #ff6b6b; font-size: 14px; display: none;
        }

        /* ============================
           底部控制栏：音量 + 全屏 + 主题切换
           ============================ */
        #controlBar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 16px;
            padding: 8px 24px;
            background: var(--bg-tertiary);
            height: 48px;
            border-top: 1px solid var(--border-color);
        }
        #controlBar .vol-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #controlBar .vol-group .vol-btn {
            background: transparent; border: none;
            color: var(--text-secondary); font-size: 16px;
            cursor: pointer; padding: 2px; line-height: 1;
            transition: color .2s;
        }
        #controlBar .vol-group .vol-btn:hover { color: var(--text-primary); }
        #controlBar .vol-group input[type=range] {
            width: 90px; height: 4px; -webkit-appearance: none;
            background: var(--slider-bg); border-radius: 2px; outline: none;
        }
        #controlBar .vol-group input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px;
            border-radius: 50%; background: var(--slider-thumb); cursor: pointer;
        }
        #controlBar .ctrl-btn {
            background: transparent; border: none;
            color: var(--text-secondary); font-size: 16px;
            cursor: pointer; padding: 4px 8px; border-radius: 4px;
            transition: color .2s, background .2s;
            line-height: 1;
        }
        #controlBar .ctrl-btn:hover { color: var(--text-primary); background: var(--input-bg); }
        #controlBar .theme-btn { font-size: 18px; }

        /* ============================
           断开提示遮罩
           ============================ */
        #overlay {
            position: fixed; inset: 0; z-index: 60;
            display: none; align-items: center; justify-content: center;
            background: var(--overlay-bg);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        #overlay.show { display: flex; }
        #overlay .msg { text-align: center; }
        #overlay .msg .icon { font-size: 48px; margin-bottom: 12px; }
        #overlay .msg .text { color: var(--text-primary); font-size: 18px; font-weight: 500; }
        #overlay .msg .sub { color: var(--text-muted); font-size: 14px; margin-top: 6px; }
        #overlay .msg .retry-btn {
            margin-top: 20px; padding: 10px 28px; border-radius: 8px;
            border: none; background: #FF4400; color: #fff;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: background .2s;
        }
        #overlay .msg .retry-btn:hover { background: #e63e00; }

        /* ============================
           响应式
           ============================ */
        @media (max-width: 600px) {
            .launcher-title { font-size: 22px; }
            .launcher-form { flex-direction: column; }
            #topBar { padding: 10px 12px; }
            #bottomBar { padding: 10px 12px; gap: 10px; }
            #bottomBar .vol-group input[type=range] { width: 50px; }
        }
    </style>
</head>
<body>

<!-- ======================== 初始界面 ======================== -->
<div id="launcher">
    <div class="launcher-logo">斗</div>
    <div class="launcher-title">斗鱼纯净播放器</div>
    <div class="launcher-sub">只播放直播画面，没有弹幕和杂项干扰</div>
    <div class="launcher-form">
        <input id="roomInput" type="text" placeholder="输入直播间号" value="5092355" />
        <button onclick="launch()">开始观看</button>
    </div>
    <div class="launcher-hint">例如 <code>6</code> <code>5092355</code></div>
    <div class="launcher-error" id="launcherError"></div>
</div>

<!-- ======================== 播放器主体 ======================== -->
<div id="app">
    <!-- 主播信息栏（视频上方靠左，不遮挡画面） -->
    <div id="anchorBar">
        <div class="avatar">
            <img id="anchorAvatar" src="" alt="头像" />
        </div>
        <div class="info">
            <div class="top-row">
                <span class="name" id="anchorName">加载中</span>
                <span class="live-badge">
                    <span class="dot"></span>
                    <span class="label" id="anchorStatus">...中</span>
                </span>
            </div>
            <div class="title" id="anchorTitle">获取主播信息中</div>
        </div>
    </div>

    <div id="videoWrapper">
        <video id="video" autoplay playsinline></video>

        <!-- 断开/重连遮罩 -->
        <div id="overlay">
            <div class="msg">
                <div class="icon">📡</div>
                <div class="text" id="overlayText">连接已断开</div>
                <div class="sub" id="overlaySub">正在尝试自动重连...</div>
                <button class="retry-btn" onclick="manualReconnect()">手动重连</button>
            </div>
        </div>
    </div>

    <!-- 底部控制栏（音量 + 全屏 + 主题切换，靠右） -->
    <div id="controlBar">
        <div class="vol-group">
            <button class="vol-btn" id="muteBtn" onclick="toggleMute()" title="静音开关">🔊</button>
            <input type="range" id="volSlider" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)" />
        </div>
        <button class="ctrl-btn theme-btn" id="themeBtn" onclick="toggleTheme()" title="切换主题">🌙</button>
        <button class="ctrl-btn" onclick="toggleFullscreen()" title="全屏">⛶</button>
    </div>
</div>

<script>
    /* ============================================================
     *  状态
     * ============================================================ */
    let flvPlayer = null;
    let currentRoomId = "";
    let isPlaying = false;
    let isMuted = false;
    let isBrowserMuted = false;  // 浏览器因自动播放策略强制静音
    let reconnectTimer = null;
    let reconnectAttempts = 0;
    const MAX_RECONNECT = 10;
    const RECONNECT_INTERVAL = 5000;

    let currentStreamUrl = "";

    const video = document.getElementById("video");
    const app = document.getElementById("app");
    const videoWrapper = document.getElementById("videoWrapper");
    const overlay = document.getElementById("overlay");

    /* ============================================================
     *  启动
     * ============================================================ */
    function launch() {
        const input = document.getElementById("roomInput").value.trim();
        if (!input) return showError("请输入直播间号");
        currentRoomId = parseRoomId(input);
        if (!currentRoomId) return showError("直播间号格式不对");

        document.getElementById("launcher").classList.add("hidden");
        hideError();
        startStream(currentRoomId);
    }

    function parseRoomId(val) {
        const m = val.match(/(\d+)/);
        return m ? m[1] : null;
    }

    function showError(msg) {
        const el = document.getElementById("launcherError");
        el.textContent = msg;
        el.style.display = "block";
    }
    function hideError() {
        document.getElementById("launcherError").style.display = "none";
    }

    /* ============================================================
     *  Step 1: 通过后端 API 获取流地址
     * ============================================================ */
    async function startStream(roomId) {
        currentRoomId = roomId;
        showOverlay("📡", "获取直播信息...", "请稍候");
        updateStatus("connecting", "获取中...");
        reconnectAttempts = 0;

        try {
            // 先获取房间信息
            const roomRes = await fetch(`/api/room/${roomId}`);
            if (roomRes.ok) {
                const roomData = await roomRes.json();
                const room = roomData?.room;
                if (room) {
                    // 填充主播信息卡片（视频上方）
                    const isLive = room.status === "1";
                    document.getElementById("anchorName").textContent = room.nickname || "未知";
                    document.getElementById("anchorStatus").textContent = isLive ? "开播" : "未开播";
                    document.getElementById("anchorTitle").textContent = room.room_name || "";
                    if (room.avatar?.big) {
                        document.getElementById("anchorAvatar").src = room.avatar.big;
                    } else if (room.avatar?.small) {
                        document.getElementById("anchorAvatar").src = room.avatar.small;
                    }
                }
            }

            // 获取流地址
            const res = await fetch(`/api/live/${roomId}?rate=0`);
            const data = await res.json();

            if (data.living === false) {
                showOverlay("😴", "主播未开播", "当前没有直播信号");
                updateStatus("offline", "未开播");
                return;
            }

            currentStreamUrl = data.currentStream.url;

            // 开始播放
            initPlayer(currentStreamUrl);
        } catch (err) {
            console.error("获取流地址失败:", err);
            if (reconnectAttempts < MAX_RECONNECT) {
                scheduleReconnect(roomId, err.message);
            } else {
                showOverlay("❌", "获取失败", err.message || "无法获取直播流地址");
                updateStatus("error", "获取失败");
            }
        }
    }

    /* ============================================================
     *  Step 2: 初始化 flv.js 播放器
     * ============================================================ */
    function initPlayer(url) {
        destroyPlayer();

        if (!flvjs.isSupported()) {
            showOverlay("⚠️", "浏览器不支持", "当前浏览器不支持 flv.js 播放");
            return;
        }

        try {
            // 尝试直连 — 先用原始 URL
            // 如果遇到 CORS 问题，会自动走代理
            flvPlayer = flvjs.createPlayer(
                { type: "flv", url: url, isLive: true },
                {
                    enableWorker: false,      // 不启用 Worker（兼容性更好）
                    enableStashBuffer: false, // 直播场景关闭缓冲
                    stashInitialSize: 128,    // 128KB 初始缓冲
                    isLive: true,
                },
            );

            flvPlayer.attachMediaElement(video);
            flvPlayer.load();

            // 先解除静音（在用户手势上下文中，play() 可以带声音）
            video.muted = false;
            video.volume = parseFloat(document.getElementById("volSlider").value) || 1;

            flvPlayer.play().then(() => {
                isPlaying = true;
                isBrowserMuted = false;
                isMuted = false;
                updateMuteUI();
                hideOverlay();
                updateStatus("live", "直播中");
            }).catch((err) => {
                // 浏览器自动播放政策阻止带声音播放 → 回退到静音自动播放
                console.warn("带声音播放被阻止，回退静音模式:", err.message);
                video.muted = true;
                isBrowserMuted = true;
                isMuted = true;
                flvPlayer.play().then(() => {
                    isPlaying = true;
                    updateMuteUI();
                    hideOverlay();
                    updateStatus("live", "直播中 (点击画面取消静音)");
                }).catch((err2) => {
                    console.warn("flv.js play() 被阻止，尝试代理模式...", err2);
                    tryProxyPlay(url);
                });
            });

            // 错误监听
            flvPlayer.on(flvjs.Events.ERROR, (errType, errDetail, errInfo) => {
                console.error("flv.js 错误:", errType, errDetail, errInfo);
                handlePlayerError(errType, errDetail);
            });

            // 统计信息更新
            flvPlayer.on(flvjs.Events.STATISTICS_INFO, (stats) => {
                // 可选：显示下载速度等
            });

        } catch (err) {
            console.error("初始化播放器失败:", err);
            tryProxyPlay(url);
        }
    }

    /* ============================================================
     *  代理模式重试（解决 CORS 问题）
     * ============================================================ */
    async function tryProxyPlay(url) {
        destroyPlayer();
        const proxyUrl = `/api/proxy?url=${encodeURIComponent(url)}`;

        try {
            flvPlayer = flvjs.createPlayer(
                { type: "flv", url: proxyUrl, isLive: true },
                {
                    enableWorker: false,
                    enableStashBuffer: false,
                    stashInitialSize: 128,
                    isLive: true,
                },
            );

            flvPlayer.attachMediaElement(video);
            flvPlayer.load();
            video.muted = false;
            video.volume = parseFloat(document.getElementById("volSlider").value) || 1;
            await flvPlayer.play();
            isPlaying = true;
            isBrowserMuted = false;
            isMuted = false;
            updateMuteUI();
            hideOverlay();
            updateStatus("live", "直播中(代理)");
        } catch (err2) {
            console.error("代理模式也失败:", err2);
            showOverlay("❌", "播放失败", `CORS 错误，请检查后端代理配置`);
            updateStatus("error", "播放失败");
        }
    }

    /* ============================================================
     *  断流重连逻辑
     * ============================================================ */
    function handlePlayerError(errType, errDetail) {
        console.log("播放器错误:", errType, errDetail);

        if (errType === "NetworkError" || errType === "MediaError") {
            // 网络断开或媒体错误 — 尝试重连
            if (reconnectAttempts < MAX_RECONNECT && currentRoomId) {
                scheduleReconnect(currentRoomId);
            } else {
                showOverlay("📡", "连接断开", "已达到最大重连次数，请手动重试");
                updateStatus("error", "断开");
            }
        }
    }

    function scheduleReconnect(roomId, reason) {
        reconnectAttempts++;
        const msg = reason ? `(${reason.substring(0, 30)})` : "";
        showOverlay(
            "📡",
            `连接断开，正在重连 (${reconnectAttempts}/${MAX_RECONNECT})`,
            `${RECONNECT_INTERVAL / 1000}秒后自动重试 ${msg}`,
        );
        updateStatus("reconnecting", `重连中 ${reconnectAttempts}/${MAX_RECONNECT}`);

        clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(() => {
            startStream(roomId);
        }, RECONNECT_INTERVAL);
    }

    function manualReconnect() {
        clearTimeout(reconnectTimer);
        if (currentRoomId) {
            reconnectAttempts = 0;
            startStream(currentRoomId);
        }
    }

    /* ============================================================
     *  播放器销毁与切换
     * ============================================================ */
    function destroyPlayer() {
        if (flvPlayer) {
            try {
                flvPlayer.pause();
                flvPlayer.unload();
                flvPlayer.detachMediaElement();
                flvPlayer.destroy();
            } catch (e) {
                console.warn("销毁播放器:", e.message);
            }
            flvPlayer = null;
        }
        isPlaying = false;
    }


    /* ============================================================
     *  播放控制
     * ============================================================ */
    function setVolume(val) {
        video.volume = val;
        if (parseFloat(val) > 0 && isMuted) {
            // 用户主动调音量 → 自动取消静音
            video.muted = false;
            isMuted = false;
            isBrowserMuted = false;
            updateMuteUI();
        }
    }

    function toggleMute() {
        if (isMuted) {
            video.muted = false;
            isMuted = false;
            isBrowserMuted = false;
            document.getElementById("volSlider").value = 1;
            video.volume = 1;
        } else {
            video.muted = true;
            isMuted = true;
        }
        updateMuteUI();
    }

    function updateMuteUI() {
        const btn = document.getElementById("muteBtn");
        if (isMuted) {
            btn.textContent = isBrowserMuted ? "🔇" : "🔇";
            btn.title = isBrowserMuted ? "浏览器已静音，点击取消静音" : "已静音，点击取消";
        } else {
            btn.textContent = "🔊";
            btn.title = "静音开关";
        }
    }

    // 点击画面取消浏览器静音
    video.addEventListener("click", () => {
        if (isBrowserMuted) {
            video.muted = false;
            isMuted = false;
            isBrowserMuted = false;
            video.volume = parseFloat(document.getElementById("volSlider").value) || 1;
            updateMuteUI();
            updateStatus("live", "直播中");
        }
    });

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            videoWrapper.requestFullscreen?.() || videoWrapper.webkitRequestFullscreen?.();
        } else {
            document.exitFullscreen?.() || document.webkitExitFullscreen?.();
        }
    }

    /* ============================================================
     *  主题切换
     * ============================================================ */
    function toggleTheme() {
        const isLight = app.classList.toggle("light");
        document.getElementById("themeBtn").textContent = isLight ? "☀️" : "🌙";
        document.getElementById("themeBtn").title = isLight ? "切换暗色主题" : "切换浅色主题";
        localStorage.setItem("douyu-theme", isLight ? "light" : "dark");
    }

    function loadTheme() {
        const saved = localStorage.getItem("douyu-theme");
        if (saved === "light") {
            app.classList.add("light");
            document.getElementById("themeBtn").textContent = "☀️";
            document.getElementById("themeBtn").title = "切换暗色主题";
        }
    }
    loadTheme();

    /* ============================================================
     *  UI 辅助
     * ============================================================ */
    function updateStatus(state, text) {
        // 状态显示已移除
    }

    function showOverlay(icon, text, sub) {
        overlay.classList.add("show");
        document.querySelector("#overlay .icon").textContent = icon;
        document.getElementById("overlayText").textContent = text;
        document.getElementById("overlaySub").textContent = sub || "";
    }

    function hideOverlay() {
        overlay.classList.remove("show");
    }

    /* ============================================================
     *  键盘快捷键
     * ============================================================ */
    document.addEventListener("keydown", (e) => {
        if (e.target.tagName === "INPUT") return;

        switch (e.key) {
            case "f":
            case "F":
                toggleFullscreen();
                break;
        }
    });

    /* ============================================================
     *  回车触发
     * ============================================================ */
    document.getElementById("roomInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") launch();
    });

</script>
</body>
</html>
